apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth-service.name" . }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "auth-service.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "auth-service.name" . }}
    spec:
      containers:
      - name: auth-service
        image: {{ include "auth-service.image" . }}
        ports:
        - containerPort: 4000
        env:
        # Secrets
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "auth-service.name" . }}-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "auth-service.name" . }}-db-secret
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: {{ include "auth-service.name" . }}-db-secret
              key: dbname
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: {{ include "auth-service.name" . }}-db-secret
              key: port
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "auth-service.name" . }}-config
              key: DATABASE_HOST